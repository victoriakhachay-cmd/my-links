<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мої посилання</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f0f1a, #1f1f3a);
        color: white;
        text-align: center;
    }

    .container {
        margin-top: 60px;
    }

    .avatar {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 3px solid #fff;
        box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    h1 {
        margin: 15px 0 5px;
        font-size: 26px;
    }

    p {
        color: #bbb;
        margin-bottom: 25px;
    }

    .link {
        display: block;
        width: 85%;
        max-width: 320px;
        margin: 12px auto;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        color: white;
        text-decoration: none;
        border-radius: 40px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        transition: 0.3s;
    }

    .link:hover {
        transform: scale(1.05);
        background: #ff4d6d;
    }

    .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<div class="container">
    <img class="avatar" src="коледж/Alina.jpg" alt="avatar">

    <h1>Аліна Хачай</h1>
    <p>Фотограф</p>

    <a class="link" href="https://instagram.com/tea.vik" target="_blank">Instagram</a>
    <a class="link" href="https://t.me/tteavik" target="_blank">Telegram</a>
    <a class="link" href="https://tiktok.com/@teavik" target="_blank">TikTok</a>

    <div class="footer">© 2026</div>
</div>

</body>
</html>
